name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run tests
        run: ./gradlew :emvdecoder:allTests :qrscanner-core:allTests

      # Publica TODOS los módulos con el plugin vanniktech aplicado:
      # emvdecoder, qrscanner-core y qrscanner-compose (versión única VERSION_NAME).
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Build release artifacts
        run: ./gradlew :emvdecoder:assemble :qrscanner-core:assemble :qrscanner-compose:assemble :emvdecoder:linkReleaseFrameworkIosArm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            emvdecoder/build/outputs/aar/*.aar
            qrscanner-core/build/outputs/aar/*.aar
            qrscanner-compose/build/outputs/aar/*.aar

  # Tras publicar, abre un PR que sube el pin `emvdecoder` de libs.versions.toml
  # (la versión que androidApp consume desde Maven Central) a la versión recién
  # publicada. Así el flujo tag → bump del pin no depende de un paso manual.
  bump-consumer-pin:
    name: PR de bump del pin de emvdecoder
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create bump PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          CURRENT=$(grep -m1 '^emvdecoder = "' gradle/libs.versions.toml | sed 's/.*"\(.*\)".*/\1/')

          if [ "$CURRENT" = "$VERSION" ]; then
            echo "El pin ya está en $VERSION; nada que hacer."
            exit 0
          fi

          BRANCH="chore/bump-emvdecoder-$VERSION"
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[]')" ]; then
            echo "Ya existe un PR abierto para $BRANCH; nada que hacer."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          sed -i "s/^emvdecoder = \".*\"/emvdecoder = \"$VERSION\"/" gradle/libs.versions.toml
          git commit -am "Bump emvdecoder consumer pin to $VERSION"
          git push origin "$BRANCH"

          gh pr create --base main --head "$BRANCH" \
            --title "Bump emvdecoder consumer pin to $VERSION" \
            --body "$(printf 'Sube el pin de `emvdecoder` en `libs.versions.toml` a **%s** (la versión que androidApp consume desde Maven Central), recién publicada por el release.\n\n> **Nota**: Maven Central tarda ~15-60 min en sincronizar tras la publicación. Además, los PRs creados con `GITHUB_TOKEN` no disparan el CI automáticamente: cuando el artefacto esté disponible en Central, **cierra y reabre este PR** (o empuja un commit vacío) para lanzar los checks antes de mergear.\n\n🤖 PR creado automáticamente por el workflow de release.' "$VERSION")"
