name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (host tests, AAR, demo APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Static analysis (detekt)
        run: ./gradlew :emvdecoder:detekt

      - name: Public API compatibility (ABI check)
        run: ./gradlew :emvdecoder:checkKotlinAbi

      - name: Run Android host and JVM tests with coverage gate
        run: ./gradlew :emvdecoder:testAndroidHostTest :emvdecoder:jvmTest :emvdecoder:koverVerify :emvdecoder:koverXmlReport

      - name: Run qrscanner host tests
        run: ./gradlew :qrscanner-core:testAndroidHostTest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: emvdecoder/build/reports/kover/report.xml

      - name: Build library AAR
        run: ./gradlew :emvdecoder:assemble

      - name: Build demo APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: emvdecoder/build/reports/tests/

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: emvdecoder-aar
          path: emvdecoder/build/outputs/aar/*.aar

  ios:
    name: iOS (simulator tests, framework)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run iOS simulator tests
        run: ./gradlew :emvdecoder:iosSimulatorArm64Test :qrscanner-core:iosSimulatorArm64Test

      - name: Build iOS frameworks
        run: ./gradlew :emvdecoder:linkReleaseFrameworkIosArm64 :emvdecoder:linkDebugFrameworkIosSimulatorArm64

      - name: Build QrdKit umbrella framework
        run: ./gradlew :qrscanner-compose:linkDebugFrameworkIosSimulatorArm64

      - name: Smoke build iOS app (validates pbxproj + framework embed)
        run: >
          xcodebuild -project iosApp/iosApp.xcodeproj -scheme iosApp
          -sdk iphonesimulator -destination 'generic/platform=iOS Simulator'
          ARCHS=arm64 ONLY_ACTIVE_ARCH=YES build CODE_SIGNING_ALLOWED=NO

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-reports
          path: emvdecoder/build/reports/tests/
